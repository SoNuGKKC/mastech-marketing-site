<svg width="1200" height="750" viewBox="0 0 1200 750" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#05070B"/>
      <stop offset="1" stop-color="#071225"/>
    </linearGradient>
    <linearGradient id="glass2" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#00B8FF"/>
      <stop offset="1" stop-color="#FF8A2A"/>
    </linearGradient>
    <filter id="shadow2" x="-30" y="-30" width="1260" height="810" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <rect width="1200" height="750" rx="28" fill="url(#bg2)"/>
  <circle cx="240" cy="640" r="260" fill="#FF8A2A" fill-opacity="0.08"/>
  <circle cx="1040" cy="620" r="320" fill="#00B8FF" fill-opacity="0.08"/>

  <rect x="60" y="60" width="1080" height="630" rx="26" fill="url(#glass2)" stroke="#FFFFFF" stroke-opacity="0.12" filter="url(#shadow2)"/>

  <!-- Header -->
  <rect x="84" y="84" width="1032" height="58" rx="18" fill="#0B0F18" fill-opacity="0.55" stroke="#FFFFFF" stroke-opacity="0.10"/>
