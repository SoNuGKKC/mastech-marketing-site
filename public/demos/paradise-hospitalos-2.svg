  <text x="846" y="624" fill="#FFFFFF" fill-opacity="0.92" font-family="ui-sans-serif, system-ui, Segoe UI, Arial" font-size="24" font-weight="900">
    � 12,480
  </text>

  <text x="110" y="650" fill="#FFFFFF" fill-opacity="0.55" font-family="ui-sans-serif, system-ui, Segoe UI, Arial" font-size="12" font-weight="700">
