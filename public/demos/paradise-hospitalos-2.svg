    Pharmacy / Billing
  </text>
  <rect x="930" y="102" width="186" height="22" rx="11" fill="url(#accent2)" fill-opacity="0.22" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="952" y="118" fill="#FFFFFF" fill-opacity="0.72" font-family="ui-sans-serif, system-ui, Segoe UI, Arial" font-size="12" font-weight="800" letter-spacing="0.08em">
