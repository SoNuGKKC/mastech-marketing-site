  <rect x="84" y="160" width="1032" height="510" rx="22" fill="#0B0F18" fill-opacity="0.40" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <rect x="110" y="190" width="220" height="16" rx="8" fill="#FFFFFF" fill-opacity="0.10"/>
  <rect x="350" y="190" width="140" height="16" rx="8" fill="#FFFFFF" fill-opacity="0.08"/>
  <rect x="510" y="190" width="140" height="16" rx="8" fill="#FFFFFF" fill-opacity="0.08"/>
  <rect x="670" y="190" width="140" height="16" rx="8" fill="#FFFFFF" fill-opacity="0.08"/>
  <rect x="830" y="190" width="260" height="16" rx="8" fill="#FFFFFF" fill-opacity="0.08"/>

  <!-- Rows -->
  <g opacity="0.95">
    <rect x="110" y="228" width="980" height="48" rx="16" fill="#FFFFFF" fill-opacity="0.04"/>
    <rect x="110" y="284" width="980" height="48" rx="16" fill="#FFFFFF" fill-opacity="0.03"/>
    <rect x="110" y="340" width="980" height="48" rx="16" fill="#FFFFFF" fill-opacity="0.04"/>
    <rect x="110" y="396" width="980" height="48" rx="16" fill="#FFFFFF" fill-opacity="0.03"/>
    <rect x="110" y="452" width="980" height="48" rx="16" fill="#FFFFFF" fill-opacity="0.04"/>
    <rect x="110" y="508" width="980" height="48" rx="16" fill="#FFFFFF" fill-opacity="0.03"/>
  </g>

  <!-- Right summary card -->
  <rect x="820" y="556" width="270" height="92" rx="20" fill="url(#accent2)" fill-opacity="0.12" stroke="#FFFFFF" stroke-opacity="0.10"/>
  <text x="846" y="592" fill="#FFFFFF" fill-opacity="0.85" font-family="ui-sans-serif, system-ui, Segoe UI, Arial" font-size="13" font-weight="900" letter-spacing="0.08em">
