# Auto-deploy mastechsolution (Vite → dist) on push to main, or run manually from Actions tab.
# Setup: GitHub repo secrets NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID — see NETLIFY_AUTO_DEPLOY.md

name: Deploy marketing site (Netlify)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install & build
        run: |
          npm ci
          npm run build

      - name: Deploy production to Netlify
        run: npx --yes netlify-cli deploy --prod --dir=dist --message "gh ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
